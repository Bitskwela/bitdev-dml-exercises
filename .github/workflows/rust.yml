name: rust-answers
on:
  push:
    paths:
      - 'contracts/**/*.rs'
      - 'scripts/check-rust.sh'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'contracts/**/*.rs'
      - 'scripts/check-rust.sh'
      - '.github/workflows/rust.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile-check all Rust activity files
        run: bash scripts/check-rust.sh
